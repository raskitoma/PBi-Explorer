- subsource: graph.signIns
  target_column: timestamp
  source_jsonpath: $.createdDateTime
  transform: "iso_to_dt3"
- subsource: graph.signIns
  target_column: operation
  source_jsonpath: $.status.errorCode
  transform: "signin_status"
- subsource: graph.signIns
  target_column: instance
  source_jsonpath: $.id
  transform: "const:signins"
- subsource: graph.signIns
  target_column: user_name
  source_jsonpath: $.userPrincipalName
- subsource: graph.signIns
  target_column: user_id
  source_jsonpath: $.userId
- subsource: graph.signIns
  target_column: comments
  source_jsonpath: $.status.failureReason
  transform: "truncate:1024"
- subsource: graph.signIns
  target_column: extra_data.external_id
  source_jsonpath: $.id
- subsource: graph.signIns
  target_column: extra_data.ip
  source_jsonpath: $.ipAddress
- subsource: graph.signIns
  target_column: extra_data.app_display_name
  source_jsonpath: $.appDisplayName
- subsource: graph.signIns
  target_column: extra_data.client_app_used
  source_jsonpath: $.clientAppUsed
- subsource: graph.signIns
  target_column: extra_data.location
  source_jsonpath: $.location
- subsource: graph.signIns
  target_column: extra_data.error_code
  source_jsonpath: $.status.errorCode
- subsource: graph.signIns
  target_column: extra_data.conditional_access_status
  source_jsonpath: $.conditionalAccessStatus
