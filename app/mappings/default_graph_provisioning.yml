- subsource: graph.provisioning
  target_column: timestamp
  source_jsonpath: $.activityDateTime
  transform: "iso_to_dt3"
- subsource: graph.provisioning
  target_column: operation
  source_jsonpath: $.activityName
  transform: "lower_snake"
- subsource: graph.provisioning
  target_column: instance
  source_jsonpath: $.id
  transform: "const:provisioning"
- subsource: graph.provisioning
  target_column: user_name
  source_jsonpath: $.targetIdentity.identifier
- subsource: graph.provisioning
  target_column: user_id
  source_jsonpath: $.targetIdentity.id
- subsource: graph.provisioning
  target_column: comments
  source_jsonpath: $.statusInfo.status
  transform: "truncate:1024"
- subsource: graph.provisioning
  target_column: extra_data.external_id
  source_jsonpath: $.id
- subsource: graph.provisioning
  target_column: extra_data.source_system
  source_jsonpath: $.sourceSystem.displayName
- subsource: graph.provisioning
  target_column: extra_data.target_system
  source_jsonpath: $.targetSystem.displayName
- subsource: graph.provisioning
  target_column: extra_data.status_info
  source_jsonpath: $.statusInfo
