- subsource: graph.directoryAudits
  target_column: timestamp
  source_jsonpath: $.activityDateTime
  transform: "iso_to_dt3"
- subsource: graph.directoryAudits
  target_column: operation
  source_jsonpath: $.activityDisplayName
  transform: "canonicalize:operations"
- subsource: graph.directoryAudits
  target_column: instance
  source_jsonpath: $.loggedByService
  transform: "canonicalize:instance"
- subsource: graph.directoryAudits
  target_column: user_name
  source_jsonpath: $.initiatedBy.user.userPrincipalName
  transform: "coalesce:$.initiatedBy.app.displayName"
- subsource: graph.directoryAudits
  target_column: user_id
  source_jsonpath: $.initiatedBy.user.id
  transform: "coalesce:$.initiatedBy.app.servicePrincipalId"
- subsource: graph.directoryAudits
  target_column: comments
  source_jsonpath: $.result
  transform: "truncate:1024"
- subsource: graph.directoryAudits
  target_column: extra_data.category
  source_jsonpath: $.category
- subsource: graph.directoryAudits
  target_column: extra_data.correlation_id
  source_jsonpath: $.correlationId
- subsource: graph.directoryAudits
  target_column: extra_data.external_id
  source_jsonpath: $.id
- subsource: graph.directoryAudits
  target_column: extra_data.target_resources
  source_jsonpath: $.targetResources
- subsource: graph.directoryAudits
  target_column: extra_data.result_reason
  source_jsonpath: $.resultReason
