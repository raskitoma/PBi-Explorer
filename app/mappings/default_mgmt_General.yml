- subsource: mgmt.General
  target_column: timestamp
  source_jsonpath: $.CreationTime
  transform: "iso_to_dt3"
- subsource: mgmt.General
  target_column: operation
  source_jsonpath: $.Operation
  transform: "canonicalize:operations"
- subsource: mgmt.General
  target_column: instance
  source_jsonpath: $.Workload
  transform: "canonicalize:instance"
- subsource: mgmt.General
  target_column: user_name
  source_jsonpath: $.UserId
- subsource: mgmt.General
  target_column: user_id
  source_jsonpath: $.UserKey
  transform: "coalesce:$.UserId"
- subsource: mgmt.General
  target_column: comments
  source_jsonpath: $.ResultStatus
  transform: "truncate:1024"
- subsource: mgmt.General
  target_column: extra_data.external_id
  source_jsonpath: $.Id
- subsource: mgmt.General
  target_column: extra_data.client_ip
  source_jsonpath: $.ClientIP
